services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: ndc-keycloak
    command:
      - start-dev
      - --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8082
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
    ports:
      - "8082:8082"
    volumes:
      - ./local/keycloak/realm-export.json:/opt/keycloak/data/import/realm.json:ro
    # Niente healthcheck: l'immagine distroless di Keycloak non ha curl/wget,
    # e /health/ready vive sulla management port 9000 (non esposta).
    # Per dev locale lo stato del container basta come monitoring.
