# Profilo di test: niente OIDC discovery, tutti gli endpoint OAuth2 espliciti.
# Permette al contesto Spring di bootare senza Keycloak in esecuzione.
# issuer-uri NON impostato: eredita ${OAUTH2_ISSUER_URI:#{null}} da application.yml
# che, senza env var, vale null e disabilita la discovery.

spring:
  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: test-client
            client-secret: test-secret
            authorization-grant-type: authorization_code
            scope: openid,profile
            redirect-uri: http://localhost/login/oauth2/code/keycloak
        provider:
          keycloak:
            authorization-uri: http://localhost:0/auth
            token-uri: http://localhost:0/token
            jwk-set-uri: http://localhost:0/certs
            user-info-uri: http://localhost:0/userinfo
            user-name-attribute: preferred_username

ndc:
  bff:
    backend-url: http://localhost:0
